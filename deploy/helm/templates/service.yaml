apiVersion: v1
kind: Service
metadata:
  name: {{ include "prototype-hub.fullname" . }}
  labels:
    {{- include "prototype-hub.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "prototype-hub.fullname" . }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
