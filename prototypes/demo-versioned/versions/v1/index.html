<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #F4F5F7; color: #1D2939; display: grid; place-items: center; padding: 24px; }
    .sheet { width: 420px; max-width: 96vw; background: #fff; border: 1px solid #EAECF0;
      border-radius: 16px; overflow: hidden; }
    .head { padding: 20px 24px; border-bottom: 1px solid #EAECF0; }
    .head h1 { font-size: 18px; margin: 0; }
    .head p { margin: 4px 0 0; color: #667085; font-size: 13px; }
    .body { padding: 20px 24px; }
    .line { display: flex; justify-content: space-between; font-size: 14px; padding: 8px 0; }
    .line .muted { color: #667085; }
    .total { display: flex; justify-content: space-between; font-size: 16px; font-weight: 700;
      border-top: 1px solid #EAECF0; margin-top: 8px; padding-top: 14px; }
    .btn { width: 100%; margin-top: 20px; padding: 13px; border: 0; border-radius: 10px;
      background: #1D2939; color: #fff; font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; }
    .btn:hover { background: #101828; }
  </style>
</head>
<body>
  <div class="sheet">
    <div class="head">
      <h1>Checkout</h1>
      <p>Review your order and pay.</p>
    </div>
    <div class="body">
      <div class="line"><span>Wireless headphones</span><span>$79.00</span></div>
      <div class="line"><span>USB-C cable (2m)</span><span>$12.00</span></div>
      <div class="line"><span class="muted">Shipping</span><span class="muted">$5.00</span></div>
      <div class="total"><span>Total</span><span>$96.00</span></div>
      <button class="btn" onclick="this.textContent='Processing...'">Place order</button>
    </div>
  </div>
</body>
</html>
