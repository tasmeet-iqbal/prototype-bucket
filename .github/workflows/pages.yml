# Deploy the Hub as a static site to GitHub Pages on every push to main.
# One-time setup: repo Settings -> Pages -> Build and deployment -> Source: "GitHub Actions".
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build static site
        run: node build.js
        env:
          # Project sites live at https://<user>.github.io/<repo>/, so the site
          # must be built under that sub-path. This fills it in automatically.
          # For a user/org site or a custom domain served from the root, delete
          # these two lines.
          HUB_BASE_PATH: /${{ github.event.repository.name }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
